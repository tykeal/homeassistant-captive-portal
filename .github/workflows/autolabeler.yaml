name: 'Autolabeler'

# yamllint disable-line rule:truthy
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions: {}

concurrency:
  # yamllint disable-line rule:line-length
  group: ${{ format('al-{0}-pr-{1}', github.event_name, github.event.pull_request.number) }}
  cancel-in-progress: true

jobs:
  autolabel:
    name: 'Autolabel PR'
    # yamllint disable rule:line-length
    if: >
      (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.fork) ||
      (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork)
    # yamllint enable rule:line-length
    permissions:
      contents: read
      pull-requests: write
    runs-on: 'ubuntu-latest'
    timeout-minutes: 3
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: release-drafter/release-drafter/autolabeler@139054aeaa9adc52ab36ddf67437541f039b88e2 # v7.1.1
