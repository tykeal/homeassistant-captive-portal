---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 Andrew Grimberg <tykeal@bardicgrove.org>

name: 'Release'

# yamllint disable-line rule:truthy
on:
  push:
    tags:
      - '**'

permissions: {}

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  repository-metadata:
    name: "Repository Metadata"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 5
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: "Gather repository metadata"
        id: repo-metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/repository-metadata-action@ceabcd987d13d7bfefd2372e01eebb0ddac45956  # v0.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_summary: 'true'
          gerrit_summary: 'false'
          artifact_upload: 'true'
          artifact_formats: 'json'

  tag-validate:
    name: 'Validate Tag Push'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write
    timeout-minutes: 5
    outputs:
      tag: "${{ steps.tag-validate.outputs.tag_name }}"
      version: "${{ steps.strip-v.outputs.version }}"
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: 'audit'

      - name: 'Checkout repository'
        # yamllint disable-line rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 'Verify pushed tag'
        id: 'tag-validate'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/tag-validate-action@67695fa3d045917ca7ecc0f1d5f0cad03e231104  # v1.0.1
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          require_type: 'semver'
          reject_development: 'true'
          require_github: 'true'
          # yamllint disable-line rule:line-length
          require_signed: 'ssh,gpg-unverifiable'

      - name: 'Strip v prefix for image tags'
        id: 'strip-v'
        shell: bash
        run: |
          # Strip v prefix for image tags
          TAG="${{ steps.tag-validate.outputs.tag_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: 'Ensure draft release exists'
        id: 'ensure-release'
        shell: bash
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          # Ensure draft release exists
          TAG="${{ steps.tag-validate.outputs.tag_name }}"
          # Check if release exists and get its draft status
          if RELEASE_INFO=$(gh release view "$TAG" \
            --json isDraft 2>/dev/null); then
            IS_DRAFT=$(echo "$RELEASE_INFO" | jq -r '.isDraft')
            if [ "$IS_DRAFT" = "true" ]; then
              echo "Draft release for tag $TAG already exists"
            else
              echo "Published release for $TAG already exists"
            fi
          else
            echo "Creating draft release for tag $TAG"
            gh release create "$TAG" \
              --draft \
              --title "Release $TAG" \
              --notes "Automated release for $TAG"
          fi

  python-build:
    name: 'Python Build'
    needs: 'tag-validate'
    runs-on: 'ubuntu-latest'
    outputs:
      matrix_json: "${{ steps.python-build.outputs.matrix_json }}"
      artefact_name: "${{ steps.python-build.outputs.artefact_name }}"
      artefact_path: "${{ steps.python-build.outputs.artefact_path }}"
    permissions:
      contents: read
      id-token: write
      attestations: write
    timeout-minutes: 12
    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 'Build Python project'
        id: 'python-build'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-build-action@38b9a4e7ee34e56d178f5bd248df52e41f7d496e  # v1.0.6
        with:
          sigstore_sign: true
          attestations: true
          path_prefix: 'addon/'

  python-tests:
    name: 'Python Tests'
    runs-on: 'ubuntu-latest'
    needs: 'python-build'
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-build.outputs.matrix_json) }}"
    permissions:
      contents: read
    timeout-minutes: 12
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Python tests [pytest] ${{ matrix.python-version }}"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-test-action@92d4110d44ebc18fa4575c6b00203ff67d01a1cb  # v1.0.1
        with:
          python_version: "${{ matrix.python-version }}"
          path_prefix: 'addon/'
          tests_path: '../tests'

  python-audit:
    name: 'Python Audit'
    runs-on: 'ubuntu-latest'
    needs: 'python-build'
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-build.outputs.matrix_json) }}"
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Audit dependencies ${{ matrix.python-version }}"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-audit-action@1776538e768c52c55c3c96495f6e25f0762ad28f  # v0.2.6
        with:
          python_version: "${{ matrix.python-version }}"
          path_prefix: 'addon/'

  sbom:
    name: 'Generate SBOM'
    runs-on: ubuntu-latest
    needs: 'python-build'
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Generate SBOM"
        id: sbom
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-sbom-action@ae4aca2ef28d7da4ec95049cc78be43e632d322a  # v0.1.0
        with:
          include_dev: "false"
          sbom_format: "both"
          path_prefix: 'addon/'

      - name: "Upload SBOM artifacts"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-files
          path: |
            sbom-cyclonedx.json
            sbom-cyclonedx.xml
          retention-days: 45

      - name: "Security scan with Grype (SARIF)"
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        id: grype-sarif
        with:
          sbom: "${{ steps.sbom.outputs.sbom_json_path }}"
          output-format: "sarif"
          output-file: "grype-results.sarif"
          fail-build: "true"

      - name: "Security scan with Grype (Text/Table)"
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        id: grype-table
        if: always()
        with:
          sbom: "${{ steps.sbom.outputs.sbom_json_path }}"
          output-format: "table"
          output-file: "grype-results.txt"
          fail-build: "false"

      - name: "Upload Grype scan results"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: grype-scan-results
          path: |
            grype-results.sarif
            grype-results.txt
          retention-days: 90

      - name: "Grype summary"
        if: always()
        run: |
            # Grype summary
            echo "## Grype Summary" >> "$GITHUB_STEP_SUMMARY"
            [ -f grype-results.txt ] && cat grype-results.txt \
              >> "$GITHUB_STEP_SUMMARY" || echo "No scan results available" \
              >> "$GITHUB_STEP_SUMMARY"

  update-addon-version:
    name: 'Update Add-on Version'
    needs:
      - 'tag-validate'
      - 'python-tests'
      - 'python-audit'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Update config.yaml version'
        shell: bash
        run: |
          # Update config.yaml version from tag
          VERSION="${{ needs.tag-validate.outputs.version }}"
          echo "Setting add-on version to: $VERSION"
          sed -i "s/^version: .*/version: \"$VERSION\"/" \
            addon/config.yaml
          echo "Updated config.yaml:"
          grep version addon/config.yaml

      - name: 'Upload versioned config'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: addon-config
          path: addon/config.yaml
          retention-days: 45

  container-init:
    name: 'Initialize Container Build'
    needs:
      - 'tag-validate'
      - 'python-tests'
      - 'python-audit'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      architectures: ${{ steps.arch.outputs.architectures }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Set architectures'
        id: 'arch'
        run: |
          echo 'architectures=["amd64", "aarch64"]' \
            >> "$GITHUB_OUTPUT"

      - name: 'Prepare build matrix'
        id: 'matrix'
        # yamllint disable-line rule:line-length
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@62a1597b84b3461abad9816d9cd92862a2b542c3  # 2026.03.2
        with:
          architectures: ${{ steps.arch.outputs.architectures }}
          image-name: 'homeassistant-captive-portal'

  container-build:
    name: 'Build ${{ matrix.arch }} Container'
    needs:
      - 'tag-validate'
      - 'container-init'
      - 'update-addon-version'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.container-init.outputs.matrix) }}
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 'Download versioned config'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: addon-config
          path: addon/

      - name: 'Determine base image'
        id: 'base-image'
        shell: bash
        run: |
          # Read build_from for this architecture
          ARCH="${{ matrix.arch }}"
          BUILD_FROM=$(yq -r \
            ".build_from.$ARCH" \
            addon/build.yaml)
          if [ -z "$BUILD_FROM" ] || \
              [ "$BUILD_FROM" = "null" ]; then
            echo "::error::No build_from for $ARCH"
            exit 1
          fi
          echo "build_from=$BUILD_FROM" \
            >> "$GITHUB_OUTPUT"

      - name: 'Build container image'
        # yamllint disable-line rule:line-length
        uses: home-assistant/builder/actions/build-image@62a1597b84b3461abad9816d9cd92862a2b542c3  # 2026.03.2
        with:
          arch: ${{ matrix.arch }}
          # yamllint disable-line rule:line-length
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: 'addon'
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.tag-validate.outputs.version }}
          push: 'true'
          version: ${{ needs.tag-validate.outputs.version }}
          build-args: |
            BUILD_FROM=${{ steps.base-image.outputs.build_from }}
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ needs.tag-validate.outputs.version }}
          cosign: 'true'

  container-publish:
    name: 'Publish Multi-arch Manifest'
    needs:
      - 'tag-validate'
      - 'container-init'
      - 'container-build'
    runs-on: 'ubuntu-latest'
    permissions:
      id-token: write
      packages: write
    timeout-minutes: 10
    outputs:
      digest: "${{ steps.digest.outputs.digest }}"
      image: "${{ steps.digest.outputs.image }}"
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: 'audit'

      - name: 'Publish multi-arch manifest'
        # yamllint disable-line rule:line-length
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@62a1597b84b3461abad9816d9cd92862a2b542c3  # 2026.03.2
        with:
          # yamllint disable-line rule:line-length
          architectures: ${{ needs.container-init.outputs.architectures }}
          # yamllint disable-line rule:line-length
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: 'homeassistant-captive-portal'
          image-tags: |
            ${{ needs.tag-validate.outputs.version }}
          cosign: 'true'

      - name: 'Capture manifest digest'
        id: 'digest'
        shell: bash
        run: |
          # Inspect published manifest for digest
          # yamllint disable-line rule:line-length
          IMAGE="ghcr.io/${{ github.repository_owner }}/homeassistant-captive-portal"
          TAG="${{ needs.tag-validate.outputs.version }}"
          # Use docker manifest inspect (works without buildx
          # builder context). Tolerate failure so fallback runs.
          DIGEST=$( (docker manifest inspect \
            "${IMAGE}:${TAG}" -v 2>/dev/null | \
            jq -r 'if type == "array" then null else .Descriptor.digest end') || true)
          if [[ -z "${DIGEST}" || "${DIGEST}" == "null" ]]; then
            # Fallback: HEAD request to OCI registry API
            REPO="${{ github.repository_owner }}"
            REPO="${REPO}/homeassistant-captive-portal"
            TOKEN=$( (curl -s \
              "https://ghcr.io/token?scope=repository:${REPO}:pull" | \
              jq -r '.token') || true)
            if [[ -n "${TOKEN}" && "${TOKEN}" != "null" ]]; then
              DIGEST=$( (curl -sI \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/vnd.oci.image.index.v1+json" \
                "https://ghcr.io/v2/${REPO}/manifests/${TAG}" | \
                (grep -i 'docker-content-digest' || true) | \
                awk '{print $2}' | tr -d '\r') || true)
            fi
          fi
          if [[ -z "${DIGEST}" || "${DIGEST}" == "null" ]]; then
            echo "::error::Failed to capture manifest digest"
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Manifest digest: ${DIGEST}"

      - name: 'Create container digest file'
        shell: bash
        run: |
          # Generate digest file for release asset
          IMAGE="${{ steps.digest.outputs.image }}"
          TAG="${{ needs.tag-validate.outputs.version }}"
          DIGEST="${{ steps.digest.outputs.digest }}"
          cat > container-digest.txt <<EOF
          Image: ${IMAGE}:${TAG}
          Digest: ${DIGEST}
          Pull: docker pull ${IMAGE}:${TAG}
          Verify: docker pull ${IMAGE}@${DIGEST}
          EOF

      - name: 'Upload container digest'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: container-digest
          path: container-digest.txt
          retention-days: 45

  attach-artefacts:
    name: 'Attach Artefacts to Release'
    runs-on: 'ubuntu-latest'
    needs:
      - 'tag-validate'
      - 'python-build'
      - 'update-addon-version'
      - 'sbom'
      - 'container-publish'
    permissions:
      contents: write
    timeout-minutes: 5
    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: '⬇ Download build artefacts'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: "${{ needs.python-build.outputs.artefact_name }}"
          path: "${{ needs.python-build.outputs.artefact_path }}"

      - name: '⬇ Download add-on config'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: addon-config
          path: release-assets

      - name: '⬇ Download container digest'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: container-digest
          path: release-assets

      - name: 'Attach artefacts to release'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/release-assets-action@985ecd2ba521dde165514af406dd114d3db5dab6  # v0.1.0
        with:
          # yamllint disable-line rule:line-length
          asset_paths: '["${{ needs.python-build.outputs.artefact_path }}/**", "release-assets/**"]'
          release_tag: "${{ needs.tag-validate.outputs.tag }}"

  promote-release:
    name: 'Promote Draft Release'
    needs:
      - 'tag-validate'
      - 'attach-artefacts'
      - 'container-publish'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write
    timeout-minutes: 2
    outputs:
      # yamllint disable-line rule:line-length
      release_url: "${{ steps.promote-release.outputs.release_url || steps.set-promoted-url.outputs.release_url }}"
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Append container info to release'
        shell: bash
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          # Append container pull instructions to release
          TAG="${{ needs.tag-validate.outputs.tag }}"
          VERSION="${{ needs.tag-validate.outputs.version }}"
          IMAGE="${{ needs.container-publish.outputs.image }}"
          DIGEST="${{ needs.container-publish.outputs.digest }}"

          BODY=$(gh release view "$TAG" \
            --json body --jq '.body')

          # Strip existing container section for idempotency
          BODY=$(echo "$BODY" | sed '/^## Container Image$/,$d')
          # Remove trailing blank lines
          BODY=$(echo "$BODY" | sed -e :a -e '/^\n*$/{$d;N;ba}')

          # Append container section
          BODY="${BODY}

          ## Container Image

          \`\`\`
          docker pull ${IMAGE}:${VERSION}
          \`\`\`

          **Digest:** \`${DIGEST}\`

          **Verify with digest:**
          \`\`\`
          docker pull ${IMAGE}@${DIGEST}
          \`\`\`"

          gh release edit "$TAG" --notes "$BODY"

      - name: 'Check if release is already promoted'
        id: 'check-promoted'
        shell: bash
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          TAG="${{ needs.tag-validate.outputs.tag }}"
          if gh release view "$TAG" --json isDraft \
              --jq '.isDraft' 2>/dev/null | grep -q "false"; then
            echo "Release $TAG is already promoted"
            echo "already_promoted=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG is draft, proceeding"
            echo "already_promoted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Promote draft release'
        id: 'promote-release'
        if: steps.check-promoted.outputs.already_promoted == 'false'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/draft-release-promote-action@cd7cf442875ecaea5dbb070d0de94f21ece107c8  # v0.1.3
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag: "${{ needs.tag-validate.outputs.tag }}"
          latest: true

      - name: 'Set release URL for already promoted release'
        id: 'set-promoted-url'
        if: steps.check-promoted.outputs.already_promoted == 'true'
        shell: bash
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          TAG="${{ needs.tag-validate.outputs.tag }}"
          RELEASE_URL=$(gh release view "$TAG" \
            --json url --jq '.url')
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"

  update-addon-store:
    name: 'Update Add-on Store'
    needs:
      - 'tag-validate'
      - 'promote-release'
    runs-on: 'ubuntu-latest'
    environment: 'release'
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176  # v2.17.0
        with:
          egress-policy: 'audit'

      - name: 'Create add-on store update PR'
        shell: bash
        env:
          GH_TOKEN: "${{ secrets.ADDONS_REPO_TOKEN }}"
        run: |
          # Update captive-portal version in add-on store
          STORE_REPO="tykeal/homeassistant-addons"
          ADDON_PATH="captive-portal/config.yaml"
          VERSION="${{ needs.tag-validate.outputs.version }}"
          BRANCH="update/captive-portal-${VERSION}"
          # yamllint disable-line rule:line-length
          RELEASE_URL="${{ needs.promote-release.outputs.release_url }}"
          # yamllint disable-line rule:line-length
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # yamllint disable-line rule:line-length
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/blob/main/.github/workflows/release.yaml"
          BOT_NAME="github-actions[bot]"
          # yamllint disable-line rule:line-length
          BOT_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"

          # Check if PR already exists for this version
          EXISTING=$(gh pr list \
            --repo "$STORE_REPO" \
            --head "$BRANCH" \
            --state all \
            --json number --jq '.[0].number // empty' \
            2>/dev/null || true)
          if [[ -n "$EXISTING" ]]; then
            echo "PR #${EXISTING} already exists"
            echo "::notice::Add-on store PR already exists: #${EXISTING}"
            exit 0
          fi

          # Get default branch
          DEFAULT_BRANCH=$(gh api \
            "repos/${STORE_REPO}" \
            --jq '.default_branch')

          # Create or reset branch from default branch
          DEFAULT_SHA=$(gh api \
            "repos/${STORE_REPO}/git/ref/heads/${DEFAULT_BRANCH}" \
            --jq '.object.sha')
          if gh api \
            "repos/${STORE_REPO}/git/ref/heads/${BRANCH}" \
            >/dev/null 2>&1; then
            echo "::notice::Branch ${BRANCH} exists; resetting"
            gh api \
              "repos/${STORE_REPO}/git/refs/heads/${BRANCH}" \
              -X PATCH \
              -f "sha=${DEFAULT_SHA}" \
              -F "force=true"
          else
            gh api \
              "repos/${STORE_REPO}/git/refs" \
              -f "ref=refs/heads/${BRANCH}" \
              -f "sha=${DEFAULT_SHA}"
          fi

          # Fetch config.yaml from the branch to get correct SHA
          TMPFILE=$(mktemp)
          trap 'rm -f "$TMPFILE"' EXIT
          gh api \
            "repos/${STORE_REPO}/contents/${ADDON_PATH}?ref=${BRANCH}" \
            --jq '.content' | base64 -d > "$TMPFILE"
          SHA=$(gh api \
            "repos/${STORE_REPO}/contents/${ADDON_PATH}?ref=${BRANCH}" \
            --jq '.sha')

          # Update the version field in-place
          # shellcheck disable=SC2001
          sed -i "s/^version: .*/version: \"${VERSION}\"/" \
            "$TMPFILE"

          # Push updated config.yaml with bot identity
          CONTENT_B64=$(base64 -w 0 < "$TMPFILE")
          COMMIT_MSG=$(printf \
            'Chore: bump captive-portal to %s\n\nSigned-off-by: %s <%s>' \
            "$VERSION" "$BOT_NAME" "$BOT_EMAIL")
          gh api \
            "repos/${STORE_REPO}/contents/${ADDON_PATH}" \
            -X PUT \
            -f "message=${COMMIT_MSG}" \
            -f "content=${CONTENT_B64}" \
            -f "sha=${SHA}" \
            -f "branch=${BRANCH}" \
            -f "committer[name]=${BOT_NAME}" \
            -f "committer[email]=${BOT_EMAIL}" \
            -f "author[name]=${BOT_NAME}" \
            -f "author[email]=${BOT_EMAIL}"

          # Create pull request
          # yamllint disable rule:line-length
          PR_BODY=$(printf \
            'Update captive-portal add-on to version %s.\n\nRelease: %s\nWorkflow run: %s\nWorkflow source: %s' \
            "$VERSION" \
            "$RELEASE_URL" \
            "$RUN_URL" \
            "$WORKFLOW_URL")
          # yamllint enable rule:line-length
          PR_URL=$(gh pr create \
            --repo "$STORE_REPO" \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH" \
            --title "Chore: update captive-portal to ${VERSION}" \
            --body "$PR_BODY")

          echo "::notice::Add-on store PR created: ${PR_URL}"
