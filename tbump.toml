# Usage: uv run tbump --no-tag --no-push <new_version>
#
# IMPORTANT: Always use --no-tag and --no-push flags!
# - Tags are created manually as annotated GPG-signed tags
# - Pushes are done manually after verification

[version]
current = "0.0.0.dev0"
regex = '''
  (?P<major>\d+)
  \.
  (?P<minor>\d+)
  \.
  (?P<patch>\d+)
  ([-.](?P<extra>.+))?
'''

[git]
message_template = "Chore: bump version to {new_version}"
tag_template = "v{new_version}"

# HA addon config — version string in YAML
[[file]]
src = "addon/config.yaml"
search = 'version: "{current_version}"'
