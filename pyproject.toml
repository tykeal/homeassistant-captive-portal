[tool.uv.workspace]
members = ["addon"]

[tool.uv.sources]
captive-portal = { workspace = true }

[dependency-groups]
dev = [
    "captive-portal",
    "pytest",
    "pytest-cov",
    "anyio",
    "ruff",
    "mypy",
    "types-PyYAML",
    "pytest-asyncio>=1.2.0",
    "tbump>=6.11.0",
]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
extend-select = ["C901"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.interrogate]
fail-under = 100
ignore-init-module = true

[tool.mypy]
python_version = "3.12"
strict = true

[[tool.mypy.overrides]]
module = "httpx"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "cryptography.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "pytest_asyncio"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "tests.integration.test_add_additional_admin",
    "tests.integration.test_admin_auth_login_logout",
    "tests.integration.test_admin_extend_revoke_grant",
    "tests.integration.test_admin_list_filters",
    "tests.integration.test_admin_session_csrf",
    "tests.integration.test_admin_session_timeout",
    "tests.integration.test_auth_status_onboarding",
    "tests.integration.test_initial_admin_bootstrap",
]
disallow_untyped_calls = false
disallow_untyped_defs = false

[tool.pytest.ini_options]
markers = [
    "contract: marks tests as contract/API tests requiring external dependencies",
    "integration: marks tests as integration tests requiring full system setup",
    "performance: marks tests as performance tests (deselect with '-m \"not performance\"')",
]
