version = 1

# Annotate spec kit files
[[annotations]]
path = ["addon/uv.lock", "uv.lock", "**.json", "captive_portal.egg-info/**", "addon/src/captive_portal.egg-info/**"]
SPDX-License-Identifier = "Apache-2.0"
SPDX-FileCopyrightText = "2025 Andrew Grimberg <tykeal@bardicgrove.org>"

[[annotations]]
path = ["addon/rootfs/etc/s6-overlay/s6-rc.d/captive-portal/type", "addon/rootfs/etc/s6-overlay/s6-rc.d/user/contents.d/captive-portal"]
SPDX-License-Identifier = "Apache-2.0"
SPDX-FileCopyrightText = "2025 Andrew Grimberg <tykeal@bardicgrove.org>"

[[annotations]]
path = ["addon/rootfs/etc/s6-overlay/s6-rc.d/captive-portal-guest/type", "addon/rootfs/etc/s6-overlay/s6-rc.d/captive-portal-guest/dependencies.d/**", "addon/rootfs/etc/s6-overlay/s6-rc.d/user/contents.d/captive-portal-guest"]
SPDX-License-Identifier = "Apache-2.0"
SPDX-FileCopyrightText = "2026 Andrew Grimberg <tykeal@bardicgrove.org>"

[[annotations]]
path = [".specify/**", ".github/*/speckit.**", ".vscode/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Andrew Grimberg <tykeal@bardicgrove.org>"
SPDX-License-Identifier = "MIT"

# Add-on artwork (binary files, no inline headers)
[[annotations]]
path = [
    "addon/icon.png",
    "addon/logo.png"
]
SPDX-License-Identifier = "Apache-2.0"
SPDX-FileCopyrightText = "2026 Andrew Grimberg <tykeal@bardicgrove.org>"
