---
name: Captive Portal Guest Access
version: "0.0.0.dev0"
slug: captive_portal_guest_access
description: >-
  Guest network captive portal integrating TP-Omada and Home Assistant
url: https://github.com/tykeal/homeassistant-captive-portal
arch:
  - amd64
  - aarch64
startup: services
init: false
panel_admin: true
panel_icon: mdi:wifi-lock
panel_title: Captive Portal
homeassistant_api: true
ingress: true
ingress_port: 8080
ingress_stream: false
auth_api: true
ports:
  "8080/tcp": null  # Not exposed on host; admin UI accessed via Ingress
  "8099/tcp": 8099  # Guest portal — default host port 8099
ports_description:
  "8080/tcp": Web interface (not needed with Ingress)
  "8099/tcp": Guest captive portal (configure WiFi controller to redirect here)
schema:
  log_level: "list(trace|debug|info|notice|warning|error|fatal)?"
  session_idle_timeout: "int(1,)?"
  session_max_duration: "int(1,)?"
  guest_external_url: "url?"
  ha_base_url: "url?"
  ha_token: "str?"
  omada_controller_url: "url?"
  omada_username: "str?"
  omada_password: "password?"
  omada_site_name: "str?"
  omada_controller_id: "str?"
  omada_verify_ssl: "bool?"
  debug_guest_portal: "bool?"
