<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Captive Portal Admin</title>
    <meta name="root-path" content="{{ rp }}">
    <link rel="stylesheet" href="{{ rp }}/static/themes/default/admin.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>Captive Portal Admin</h1>
        </div>
    </header>

    <main class="container">
        <div class="login-wrapper">
            <div class="login-card" id="login-card">
                <h2 id="card-title">Admin Login</h2>
                <div id="login-error" class="login-error hidden"></div>

                <!-- Login form (default) -->
                <form id="login-form" method="POST">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            required
                            autocomplete="username"
                            autofocus
                        >
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            autocomplete="current-password"
                        >
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>

                <!-- Setup form (first-run only) -->
                <form id="setup-form" method="POST" class="hidden">
                    <p class="setup-hint">No admin account exists yet. Create one to get started.</p>
                    <div class="form-group">
                        <label for="setup-username">Username</label>
                        <input
                            type="text"
                            id="setup-username"
                            name="username"
                            required
                            autocomplete="username"
                        >
                    </div>
                    <div class="form-group">
                        <label for="setup-email">Email</label>
                        <input
                            type="email"
                            id="setup-email"
                            name="email"
                            required
                            autocomplete="email"
                        >
                    </div>
                    <div class="form-group">
                        <label for="setup-password">Password</label>
                        <input
                            type="password"
                            id="setup-password"
                            name="password"
                            required
                            autocomplete="new-password"
                        >
                    </div>
                    <div class="form-group">
                        <label for="setup-confirm">Confirm Password</label>
                        <input
                            type="password"
                            id="setup-confirm"
                            name="confirm_password"
                            required
                            autocomplete="new-password"
                        >
                    </div>
                    <button type="submit" class="btn btn-primary">Create Admin Account</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Captive Portal v1.0 | Powered by Home Assistant</p>
        </div>
    </footer>

    <script src="{{ rp }}/static/themes/default/admin-login.js"></script>
</body>
</html>
