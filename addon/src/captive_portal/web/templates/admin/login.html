<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Captive Portal Admin</title>
    <link rel="stylesheet" href="{{ rp }}/static/themes/default/admin.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 400px;
        }
        .login-card h2 {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .login-card .form-group {
            margin-bottom: 1.25rem;
        }
        .login-card label {
            display: block;
            margin-bottom: 0.25rem;
            font-weight: 500;
        }
        .login-card input[type="text"],
        .login-card input[type="password"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
        }
        .login-card input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }
        .login-card .btn {
            width: 100%;
            padding: 0.75rem;
        }
        .login-error {
            background-color: #f8d7da;
            color: var(--danger-color);
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>Captive Portal Admin</h1>
        </div>
    </header>

    <main class="container">
        <div class="login-wrapper">
            <div class="login-card">
                <h2>Admin Login</h2>
                <div id="login-error" class="login-error"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            required
                            autocomplete="username"
                            autofocus
                        >
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            autocomplete="current-password"
                        >
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Captive Portal v1.0 | Powered by Home Assistant</p>
        </div>
    </footer>

    <script>
        const rootPath = '{{ rp }}';
        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('login-error');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            errorDiv.style.display = 'none';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const resp = await fetch(rootPath + '/api/admin/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password}),
                });

                if (resp.ok) {
                    window.location.href = rootPath + '/admin/portal-settings/';
                } else {
                    const data = await resp.json();
                    errorDiv.textContent = data.detail || 'Invalid username or password';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Unable to connect. Please try again.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
