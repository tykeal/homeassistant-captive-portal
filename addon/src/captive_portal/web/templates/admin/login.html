<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Captive Portal Admin</title>
    <meta name="root-path" content="{{ rp }}">
    <link rel="stylesheet" href="{{ rp }}/static/themes/default/admin.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 400px;
        }
        .login-card h2 {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .login-card .form-group {
            margin-bottom: 1.25rem;
        }
        .login-card label {
            display: block;
            margin-bottom: 0.25rem;
            font-weight: 500;
        }
        .login-card input[type="text"],
        .login-card input[type="password"],
        .login-card input[type="email"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
        }
        .login-card input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }
        .login-card .btn {
            width: 100%;
            padding: 0.75rem;
        }
        .login-error {
            background-color: #f8d7da;
            color: var(--danger-color);
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            display: none;
        }
        .setup-hint {
            color: #555;
            margin-bottom: 1.25rem;
            text-align: center;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1>Captive Portal Admin</h1>
        </div>
    </header>

    <main class="container">
        <div class="login-wrapper">
            <div class="login-card" id="login-card">
                <h2 id="card-title">Admin Login</h2>
                <div id="login-error" class="login-error"></div>

                <!-- Login form (default) -->
                <form id="login-form" method="POST">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            required
                            autocomplete="username"
                            autofocus
                        >
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            autocomplete="current-password"
                        >
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>

                <!-- Setup form (first-run only) -->
                <form id="setup-form" method="POST" style="display:none;">
                    <p class="setup-hint">No admin account exists yet. Create one to get started.</p>
                    <div class="form-group">
                        <label for="setup-username">Username</label>
                        <input
                            type="text"
                            id="setup-username"
                            name="username"
                            required
                            autocomplete="username"
                        >
                    </div>
                    <div class="form-group">
                        <label for="setup-email">Email</label>
                        <input
                            type="email"
                            id="setup-email"
                            name="email"
                            required
                            autocomplete="email"
                        >
                    </div>
                    <div class="form-group">
                        <label for="setup-password">Password</label>
                        <input
                            type="password"
                            id="setup-password"
                            name="password"
                            required
                            autocomplete="new-password"
                        >
                    </div>
                    <div class="form-group">
                        <label for="setup-confirm">Confirm Password</label>
                        <input
                            type="password"
                            id="setup-confirm"
                            name="confirm_password"
                            required
                            autocomplete="new-password"
                        >
                    </div>
                    <button type="submit" class="btn btn-primary">Create Admin Account</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Captive Portal v1.0 | Powered by Home Assistant</p>
        </div>
    </footer>

    <script src="{{ rp }}/static/themes/default/admin-login.js"></script>
</body>
</html>
